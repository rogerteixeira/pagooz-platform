openapi: 3.0.3
info:
  title: Pagooz Core API
  version: "0.1"
  description: Core Worker foundation API surface.
servers:
  - url: http://localhost:8787

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

paths:
  /health:
    get:
      summary: Worker health check
      responses:
        "200":
          description: Healthy

  /ready:
    get:
      summary: Worker readiness check
      responses:
        "200":
          description: Ready

  /version:
    get:
      summary: Worker version metadata
      responses:
        "200":
          description: Version payload

  /v1/payment_intents:
    post:
      summary: Create payment intent
      security:
        - ApiKeyAuth: []
      responses:
        "201":
          description: Payment intent created
        "400":
          description: Validation or context error
        "403":
          description: Scope denied
    get:
      summary: List payment intents
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Payment intent list

  /v1/payment_intents/{id}:
    get:
      summary: Get payment intent by id
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment intent
        "404":
          description: Not found

  /v1/quotes:
    post:
      summary: Create quote
      security:
        - ApiKeyAuth: []
      responses:
        "201":
          description: Quote created
        "400":
          description: Validation or context error
        "404":
          description: Payment intent not found

  /v1/quotes/{id}:
    get:
      summary: Get quote by id
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Quote
        "404":
          description: Not found

  /v1/checkout_sessions:
    post:
      summary: Create checkout session
      security:
        - ApiKeyAuth: []
      responses:
        "201":
          description: Checkout session created
        "400":
          description: Validation error
    get:
      summary: List checkout sessions
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Checkout session list

  /v1/checkout_sessions/{id}:
    get:
      summary: Get checkout session by id
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Checkout session
        "404":
          description: Not found
