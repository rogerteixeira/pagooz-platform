name = "pagooz-ledger-local"
main = "../apps/ledger-worker/src/index.ts"
compatibility_date = "2026-03-06"
workers_dev = true

[vars]
ENVIRONMENT = "local"
APP_NAME = "pagooz-ledger"
APP_VERSION = "0.1.0"
GIT_SHA = "unknown"

[[d1_databases]]
binding = "DB"
database_name = "pagooz_d1_local"
database_id = "11111111-1111-1111-1111-111111111111"
migrations_dir = "./migrations"

[[queues.consumers]]
queue = "q-ledger-commands-local"
max_batch_size = 10
max_batch_timeout = 5

[[queues.producers]]
binding = "Q_LEDGER_EVENTS"
queue = "q-ledger-events-local"

[observability]
enabled = true

[env.dev]
name = "pagooz-ledger-dev"
workers_dev = true

[env.dev.vars]
ENVIRONMENT = "dev"
APP_NAME = "pagooz-ledger"
APP_VERSION = "0.1.0"
GIT_SHA = "unknown"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "pagooz_d1_dev"
database_id = "22222222-2222-2222-2222-222222222222"
migrations_dir = "./migrations"

[[env.dev.queues.consumers]]
queue = "q-ledger-commands-dev"
max_batch_size = 10
max_batch_timeout = 5

[[env.dev.queues.producers]]
binding = "Q_LEDGER_EVENTS"
queue = "q-ledger-events-dev"

[env.staging]
