workers_dev = true

[env.prod.vars]
ENVIRONMENT = "prod"
APP_NAME = "pagooz-ledger"
APP_VERSION = "0.1.0"
GIT_SHA = "unknown"

[[env.prod.d1_databases]]
binding = "DB"
database_name = "pagooz_d1_prod"
database_id = "44444444-4444-4444-4444-444444444444"
