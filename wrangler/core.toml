name = "pagooz-core-local"
main = "../apps/core-worker/src/index.ts"
compatibility_date = "2026-03-06"
workers_dev = true

[vars]
ENVIRONMENT = "local"
APP_NAME = "pagooz-core"
DEFAULT_LOCALE = "en"
APP_VERSION = "0.1.0"
GIT_SHA = "unknown"

[[d1_databases]]
binding = "DB"
database_name = "pagooz_d1_local"
database_id = "11111111-1111-1111-1111-111111111111"
migrations_dir = "./migrations"

[[queues.producers]]
binding = "Q_LEDGER_COMMANDS"
queue = "q-ledger-commands-local"

[[queues.producers]]
binding = "Q_DOMAIN_EVENTS"
queue = "q-domain-events-local"

[[queues.producers]]
binding = "Q_NOTIFICATION_OUTBOX"
queue = "q-notification-outbox-local"

[[queues.producers]]
binding = "Q_WEBHOOK_OUTBOX"
queue = "q-webhook-outbox-local"

[[r2_buckets]]
binding = "ARTIFACTS_BUCKET"
bucket_name = "pagooz-artifacts-local"

[observability]
enabled = true

[env.dev]
name = "pagooz-core-dev"
workers_dev = true

[env.dev.vars]
ENVIRONMENT = "dev"
APP_NAME = "pagooz-core"
DEFAULT_LOCALE = "en"
APP_VERSION = "0.1.0"
GIT_SHA = "unknown"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "pagooz_d1_dev"
database_id = "22222222-2222-2222-2222-222222222222"
migrations_dir = "./migrations"

[[env.dev.queues.producers]]
binding = "Q_LEDGER_COMMANDS"
queue = "q-ledger-commands-dev"

[[env.dev.queues.producers]]
binding = "Q_DOMAIN_EVENTS"
queue = "q-domain-events-dev"

[[env.dev.queues.producers]]
binding = "Q_NOTIFICATION_OUTBOX"
queue = "q-notification-outbox-dev"

[[env.dev.queues.producers]]
binding = "Q_WEBHOOK_OUTBOX"
queue = "q-webhook-outbox-dev"

[[env.dev.r2_buckets]]
binding = "ARTIFACTS_BUCKET"
bucket_name = "pagooz-artifacts-dev"

[env.staging]
