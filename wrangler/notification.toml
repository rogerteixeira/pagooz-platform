name = "pagooz-notification-local"
main = "../apps/notification-worker/src/index.ts"
compatibility_date = "2026-03-06"
workers_dev = true

[vars]
ENVIRONMENT = "local"
APP_NAME = "pagooz-notification"
DEFAULT_LOCALE = "en"
APP_VERSION = "0.1.0"
GIT_SHA = "unknown"

[[d1_databases]]
binding = "DB"
database_name = "pagooz_d1_local"
database_id = "11111111-1111-1111-1111-111111111111"
migrations_dir = "./migrations"

[[queues.consumers]]
queue = "q-notification-outbox-local"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "q-webhook-outbox-local"
max_batch_size = 10
max_batch_timeout = 5

[[r2_buckets]]
binding = "NOTIFICATION_ASSETS_BUCKET"
bucket_name = "pagooz-notification-assets-local"

[observability]
enabled = true

[env.dev]
name = "pagooz-notification-dev"
workers_dev = true

